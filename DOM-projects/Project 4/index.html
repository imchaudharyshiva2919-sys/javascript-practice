<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="pro4.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
</head>
<body>

    <div class="wrapper">

        <h1>Number Guessing Game</h1>

        <p>
            Try and guess a random number between 1 to 100.<br>
            You have 10 attempts to guess the right answer.
        </p>

        <label for="guessField" id="guess">
            Guess a Number

            <input type="text" id="guessField" class="guessField">

            <input type="submit" id="subt" class="guessSubmit" value="Submit Guess">
        </label>

        <div class="resultParas">
            <p>Previous Guesses : <span class="guesses"></span></p>
            <p>Guesses Remaining : <span class="lastResult">10</span></p>
            <p class="lowOrHi"></p>
        </div>

    </div>

    <script src="pro4.js"></script>

</body>
</html>
